<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Literary Clock</title>
  <style>
    :root {
      color-scheme: dark;
      --ink: #151713;
      --ink-soft: #25291f;
      --paper: #f4ecd9;
      --paper-muted: #d8cdb6;
      --brass: #c99b54;
      --moss: #536b49;
      --moss-deep: #263527;
      --wine: #7b3a38;
      --line: rgba(244, 236, 217, 0.26);
      --glass: rgba(21, 23, 19, 0.72);
      --glass-light: rgba(244, 236, 217, 0.12);
      --shadow: rgba(0, 0, 0, 0.34);
    }

    * {
      box-sizing: border-box;
    }

    html {
      min-height: 100%;
      background: var(--ink);
    }

    body {
      margin: 0;
      min-height: 100vh;
      overflow-x: hidden;
      color: var(--paper);
      font-family: Georgia, "Times New Roman", "Noto Serif KR", serif;
      background: var(--ink);
    }

    button,
    a {
      font: inherit;
    }

    button {
      border: 0;
      color: inherit;
      cursor: pointer;
    }

    a {
      color: var(--paper);
      text-decoration-color: rgba(244, 236, 217, 0.48);
      text-underline-offset: 0.22em;
    }

    .stage {
      position: relative;
      min-height: 100vh;
      isolation: isolate;
    }

    .stage::before {
      position: fixed;
      inset: 0;
      z-index: -3;
      content: "";
      background-image: url("assets/literary-clock-bg.png");
      background-size: cover;
      background-position: center;
      filter: saturate(0.92) contrast(1.03);
      transform: scale(1.01);
    }

    .stage::after {
      position: fixed;
      inset: 0;
      z-index: -2;
      content: "";
      background:
        linear-gradient(90deg, rgba(12, 14, 11, 0.84), rgba(12, 14, 11, 0.52) 47%, rgba(12, 14, 11, 0.74)),
        linear-gradient(180deg, rgba(12, 14, 11, 0.34), rgba(12, 14, 11, 0.82));
    }

    .app {
      width: min(1180px, calc(100% - 48px));
      min-height: 100vh;
      margin: 0 auto;
      padding: 28px 0;
      display: grid;
      grid-template-rows: auto 1fr auto;
      gap: 24px;
    }

    .topbar,
    .footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      color: var(--paper-muted);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .mark {
      width: 38px;
      height: 38px;
      flex: 0 0 auto;
      display: grid;
      place-items: center;
      border: 1px solid rgba(201, 155, 84, 0.56);
      border-radius: 50%;
      background: rgba(21, 23, 19, 0.44);
      box-shadow: 0 12px 30px var(--shadow);
      color: var(--brass);
      font-size: 1.2rem;
    }

    .brand h1 {
      margin: 0;
      color: var(--paper);
      font-size: 1.2rem;
      font-weight: 700;
      letter-spacing: 0;
      line-height: 1.1;
    }

    .brand p,
    .footer p {
      margin: 0;
      font-family: "Segoe UI", "Noto Sans KR", sans-serif;
      font-size: 0.82rem;
      letter-spacing: 0;
    }

    .mode-pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      min-height: 36px;
      padding: 8px 12px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(21, 23, 19, 0.48);
      font-family: "Segoe UI", "Noto Sans KR", sans-serif;
      font-size: 0.82rem;
      color: var(--paper);
      white-space: nowrap;
    }

    .mode-dot {
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: var(--brass);
      box-shadow: 0 0 14px rgba(201, 155, 84, 0.9);
    }

    .main-grid {
      display: grid;
      gap: 18px;
      align-items: start;
    }

    .clock-area {
      width: min(920px, 100%);
      min-width: 0;
      margin: 0 auto;
      display: grid;
      align-items: center;
    }

    .time-kicker {
      display: flex;
      align-items: center;
      gap: 10px;
      color: var(--paper-muted);
      font-family: "Segoe UI", "Noto Sans KR", sans-serif;
      font-size: 0.9rem;
    }

    .time-kicker::before {
      width: 48px;
      height: 1px;
      content: "";
      background: var(--brass);
    }

    .digital {
      margin: 0;
      color: var(--paper);
      font-size: 1.08rem;
      line-height: 1;
      font-weight: 700;
      letter-spacing: 0;
      font-variant-numeric: tabular-nums;
      text-shadow: none;
    }

    .date-line {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      color: var(--paper-muted);
      font-family: "Segoe UI", "Noto Sans KR", sans-serif;
      font-size: 0.94rem;
    }

    .date-line span {
      display: inline-flex;
      align-items: center;
      min-height: 28px;
      padding: 4px 10px;
      border: 1px solid rgba(244, 236, 217, 0.18);
      border-radius: 999px;
      background: rgba(21, 23, 19, 0.34);
    }

    .quote-panel {
      min-width: 0;
      padding: 34px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--glass);
      box-shadow: 0 24px 70px rgba(0, 0, 0, 0.32);
      backdrop-filter: blur(16px);
    }

    .quote-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
      margin-bottom: 22px;
      color: var(--paper-muted);
      font-family: "Segoe UI", "Noto Sans KR", sans-serif;
      font-size: 0.88rem;
    }

    .quote-meta span {
      color: var(--paper-muted);
    }

    blockquote {
      margin: 0;
      max-height: none;
      overflow: auto;
      padding-right: 4px;
      color: var(--paper);
      font-size: 2.26rem;
      line-height: 1.42;
      letter-spacing: 0;
      scrollbar-color: rgba(201, 155, 84, 0.65) rgba(244, 236, 217, 0.08);
    }

    blockquote.quote-long {
      font-size: 1.72rem;
      line-height: 1.48;
    }

    blockquote.quote-very-long {
      font-size: 1.34rem;
      line-height: 1.5;
    }

    .time-word {
      color: #ffe3a5;
      background: rgba(255, 227, 165, 0.14);
      border-radius: 0.14em;
      box-decoration-break: clone;
      -webkit-box-decoration-break: clone;
      font-weight: 800;
      padding: 0 0.08em;
      text-decoration: underline;
      text-decoration-color: rgba(255, 227, 165, 0.45);
      text-underline-offset: 0.16em;
    }

    .citation {
      display: grid;
      gap: 5px;
      margin-top: 18px;
      color: var(--paper-muted);
      font-family: "Segoe UI", "Noto Sans KR", sans-serif;
      font-size: 0.92rem;
      line-height: 1.5;
    }

    .citation strong {
      color: var(--paper);
      font-weight: 650;
    }

    .mini-clock {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 10px;
      margin-top: 20px;
      color: var(--paper-muted);
      font-family: "Segoe UI", "Noto Sans KR", sans-serif;
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      margin-top: 22px;
    }

    .icon-button,
    .text-button {
      min-height: 42px;
      border: 1px solid rgba(244, 236, 217, 0.22);
      border-radius: 8px;
      background: rgba(244, 236, 217, 0.1);
      transition: background 160ms ease, border-color 160ms ease, transform 160ms ease;
    }

    .icon-button {
      width: 42px;
      display: grid;
      place-items: center;
      font-size: 1.35rem;
      line-height: 1;
    }

    .text-button {
      padding: 0 15px;
      font-family: "Segoe UI", "Noto Sans KR", sans-serif;
      font-size: 0.88rem;
    }

    .icon-button:hover,
    .text-button:hover,
    .hour-chip:hover,
    .hour-button:hover {
      border-color: rgba(201, 155, 84, 0.78);
      background: rgba(201, 155, 84, 0.16);
      transform: translateY(-1px);
    }

    .meter {
      width: min(100%, 380px);
      height: 8px;
      overflow: hidden;
      border: 1px solid rgba(244, 236, 217, 0.22);
      border-radius: 999px;
      background: rgba(21, 23, 19, 0.54);
    }

    .meter span {
      display: block;
      width: var(--minute-progress);
      height: 100%;
      border-radius: 999px;
      background: linear-gradient(90deg, var(--brass), var(--wine));
      transition: width 400ms ease;
    }

    .library-shell {
      width: min(920px, 100%);
      margin: 0 auto;
    }

    .library-toggle {
      width: 100%;
      min-height: 48px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 0 16px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(21, 23, 19, 0.7);
      color: var(--paper);
      font-family: "Segoe UI", "Noto Sans KR", sans-serif;
      box-shadow: 0 18px 48px rgba(0, 0, 0, 0.22);
    }

    .library-toggle::after {
      content: "펼치기";
      color: var(--paper-muted);
      font-size: 0.82rem;
    }

    .library-toggle[aria-expanded="true"]::after {
      content: "접기";
    }

    .library-panel {
      margin-top: 10px;
      min-width: 0;
      align-self: stretch;
      padding: 18px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(21, 23, 19, 0.68);
      box-shadow: 0 24px 70px rgba(0, 0, 0, 0.32);
      backdrop-filter: blur(16px);
    }

    .library-panel[hidden] {
      display: none;
    }

    .library-head {
      display: flex;
      justify-content: space-between;
      gap: 14px;
      align-items: end;
      margin-bottom: 14px;
    }

    .library-head h2 {
      margin: 0;
      color: var(--paper);
      font-size: 1rem;
      letter-spacing: 0;
    }

    .library-note {
      margin: 5px 0 0;
      color: var(--paper-muted);
      font-family: "Segoe UI", "Noto Sans KR", sans-serif;
      font-size: 0.78rem;
      line-height: 1.35;
    }

    .library-head span {
      color: var(--paper-muted);
      font-family: "Segoe UI", "Noto Sans KR", sans-serif;
      font-size: 0.82rem;
      white-space: nowrap;
    }

    .hour-rail {
      display: grid;
      grid-template-columns: repeat(6, minmax(0, 1fr));
      gap: 7px;
      margin-bottom: 14px;
    }

    .hour-chip {
      min-height: 34px;
      border: 1px solid rgba(244, 236, 217, 0.15);
      border-radius: 8px;
      background: rgba(244, 236, 217, 0.08);
      color: var(--paper-muted);
      font-family: "Segoe UI", "Noto Sans KR", sans-serif;
      font-size: 0.8rem;
      transition: background 160ms ease, border-color 160ms ease, transform 160ms ease;
    }

    .hour-chip[aria-pressed="true"] {
      border-color: rgba(255, 227, 165, 0.82);
      background: rgba(201, 155, 84, 0.2);
      color: var(--paper);
    }

    .hour-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
      max-height: 590px;
      overflow: auto;
      padding-right: 4px;
      scrollbar-color: rgba(201, 155, 84, 0.6) rgba(244, 236, 217, 0.08);
    }

    .hour-button {
      min-height: 68px;
      padding: 10px;
      border: 1px solid rgba(244, 236, 217, 0.15);
      border-radius: 8px;
      background: rgba(244, 236, 217, 0.08);
      color: var(--paper);
      text-align: left;
      transition: background 160ms ease, border-color 160ms ease, transform 160ms ease;
    }

    .hour-button[aria-pressed="true"] {
      border-color: rgba(255, 227, 165, 0.86);
      background: rgba(201, 155, 84, 0.22);
    }

    .hour-top {
      display: block;
      margin-bottom: 5px;
    }

    .hour-time {
      color: #ffe3a5;
      font-size: 1rem;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
    }

    .hour-work {
      display: block;
      overflow: hidden;
      color: var(--paper-muted);
      font-family: "Segoe UI", "Noto Sans KR", sans-serif;
      font-size: 0.78rem;
      line-height: 1.25;
      display: -webkit-box;
      -webkit-box-orient: vertical;
      -webkit-line-clamp: 2;
    }

    .footer {
      align-items: start;
      border-top: 1px solid rgba(244, 236, 217, 0.16);
      padding-top: 16px;
      font-family: "Segoe UI", "Noto Sans KR", sans-serif;
      line-height: 1.55;
    }

    .footer a {
      color: var(--paper-muted);
    }

    @media (max-width: 1100px) {
      .app {
        width: min(100% - 30px, 760px);
      }

      .main-grid {
        grid-template-columns: 1fr;
        align-items: start;
      }

      .digital {
        font-size: 1.02rem;
      }

      .hour-grid {
        max-height: none;
      }
    }

    @media (max-width: 620px) {
      .app {
        width: min(100% - 24px, 520px);
        padding: 18px 0;
      }

      .topbar,
      .footer,
      .library-head {
        align-items: start;
        flex-direction: column;
      }

      .mode-pill {
        width: 100%;
        justify-content: center;
      }

      .digital {
        font-size: 1rem;
      }

      blockquote {
        font-size: 1.5rem;
      }

      blockquote.quote-long {
        font-size: 1.18rem;
      }

      blockquote.quote-very-long {
        font-size: 0.96rem;
      }

      .quote-panel,
      .library-panel {
        padding: 16px;
      }

      .hour-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 7px;
      }

      .hour-button {
        min-height: 58px;
        padding: 8px;
      }

      .hour-time {
        font-size: 0.9rem;
      }

      .hour-rail {
        grid-template-columns: repeat(4, minmax(0, 1fr));
      }
    }
  </style>
</head>
<body>
  <div class="stage">
    <div class="app">
      <header class="topbar">
        <div class="brand" aria-label="Literary Clock">
          <div class="mark" aria-hidden="true">Ⅻ</div>
          <div>
            <h1>Literary Clock</h1>
            <p>시간이 문장으로 남아 있는 곳</p>
          </div>
        </div>
        <div class="mode-pill" aria-live="polite">
          <span class="mode-dot" aria-hidden="true"></span>
          <span id="modeLabel">현재 시간</span>
        </div>
      </header>

      <main class="main-grid">
        <section class="clock-area" aria-label="문학 시계">
          <article class="quote-panel" aria-live="polite">
            <div class="quote-meta">
              <span id="quoteHour">00:00</span>
              <span id="periodLabel">밤</span>
            </div>
            <blockquote id="quoteText"></blockquote>
            <div class="citation">
              <span><strong id="workTitle">Dracula</strong> · <span id="authorName">Bram Stoker</span></span>
              <a id="sourceLink" href="#" target="_blank" rel="noreferrer">자료 보기</a>
            </div>
            <div class="mini-clock">
              <p class="digital" id="digitalTime">00:00:00</p>
              <div class="date-line">
                <span id="dateLabel">2026. 07. 08.</span>
                <span id="zoneLabel">Asia/Seoul</span>
              </div>
            </div>
            <div class="controls">
              <button class="icon-button" id="prevButton" type="button" title="이전 분" aria-label="이전 분">‹</button>
              <button class="text-button" id="liveButton" type="button">현재</button>
              <button class="icon-button" id="nextButton" type="button" title="다음 분" aria-label="다음 분">›</button>
              <div class="meter" aria-hidden="true"><span id="minuteMeter"></span></div>
            </div>
          </article>
        </section>

        <section class="library-shell" aria-label="분 단위 인용문 목록">
          <button class="library-toggle" id="libraryToggle" type="button" aria-expanded="false" aria-controls="libraryPanel">
            시간별 문학작품 보기
          </button>
          <aside class="library-panel" id="libraryPanel" hidden>
            <div class="library-head">
              <div>
                <h2>시간별 60분</h2>
                <p class="library-note">선택된 시간대의 분별 구절</p>
              </div>
              <span id="countLabel">1,440분</span>
            </div>
            <div class="hour-rail" id="hourRail" aria-label="시간 선택"></div>
            <div class="hour-grid" id="hourGrid"></div>
          </aside>
        </section>
      </main>

      <footer class="footer">
        <p>하루 1,440분을 실제 문학 작품 속 시간 문장으로 넘깁니다.</p>
        <p>작품 목록은 필요할 때 펼쳐서 탐색할 수 있습니다.</p>
      </footer>
    </div>
  </div>

  <script src="assets/minute-quotes-ko.js"></script>
  <script>
    const quotes = window.MINUTE_QUOTES || [];
    const quoteMeta = window.MINUTE_QUOTE_META || {};

    const els = {
      digitalTime: document.querySelector("#digitalTime"),
      dateLabel: document.querySelector("#dateLabel"),
      zoneLabel: document.querySelector("#zoneLabel"),
      periodLabel: document.querySelector("#periodLabel"),
      quoteHour: document.querySelector("#quoteHour"),
      quoteText: document.querySelector("#quoteText"),
      workTitle: document.querySelector("#workTitle"),
      authorName: document.querySelector("#authorName"),
      sourceLink: document.querySelector("#sourceLink"),
      minuteMeter: document.querySelector("#minuteMeter"),
      modeLabel: document.querySelector("#modeLabel"),
      libraryToggle: document.querySelector("#libraryToggle"),
      libraryPanel: document.querySelector("#libraryPanel"),
      hourRail: document.querySelector("#hourRail"),
      hourGrid: document.querySelector("#hourGrid"),
      countLabel: document.querySelector("#countLabel"),
      liveButton: document.querySelector("#liveButton"),
      prevButton: document.querySelector("#prevButton"),
      nextButton: document.querySelector("#nextButton")
    };

    const state = {
      live: true,
      selectedMinute: currentMinuteIndex(),
      gridHour: new Date().getHours()
    };

    const pad = (value) => String(value).padStart(2, "0");

    function currentMinuteIndex() {
      const now = new Date();
      return now.getHours() * 60 + now.getMinutes();
    }

    function periodName(hour) {
      if (hour < 5) return "깊은 밤";
      if (hour < 8) return "새벽";
      if (hour < 12) return "아침";
      if (hour === 12) return "정오";
      if (hour < 18) return "오후";
      if (hour < 22) return "저녁";
      return "밤";
    }

    function formatDate(date) {
      return new Intl.DateTimeFormat("ko-KR", {
        year: "numeric",
        month: "2-digit",
        day: "2-digit",
        weekday: "short"
      }).format(date);
    }

    function timeFromIndex(index) {
      const normalized = (index + 1440) % 1440;
      return {
        hour: Math.floor(normalized / 60),
        minute: normalized % 60,
        label: `${pad(Math.floor(normalized / 60))}:${pad(normalized % 60)}`
      };
    }

    function indexFromTime(time) {
      const [hour, minute] = time.split(":").map(Number);
      return hour * 60 + minute;
    }

    function entryForIndex(index) {
      const { label } = timeFromIndex(index);
      return quotes.find((entry) => entry.time === label) || quotes[0] || {
        time: label,
        matchedTime: label,
        exact: false,
        phrase: "데이터 없음",
        quote: "이 분에 표시할 문학 구절 데이터를 불러오지 못했습니다.",
        work: "Unknown",
        author: "Unknown",
        sourceName: "local data",
        sourceUrl: "#"
      };
    }

    function escapeHtml(value) {
      return String(value ?? "").replace(/[&<>"']/g, (char) => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        "\"": "&quot;",
        "'": "&#39;"
      }[char]));
    }

    function highlightQuote(entry) {
      const quote = String(entry.quote || "");
      const terms = [...new Set(Array.isArray(entry.highlightTerms) ? entry.highlightTerms.filter(Boolean) : [])]
        .sort((a, b) => b.length - a.length);
      const ranges = [];

      for (const term of terms) {
        let index = quote.indexOf(term);
        while (index !== -1) {
          const end = index + term.length;
          const overlaps = ranges.some((range) => index < range.end && end > range.start);
          if (!overlaps) ranges.push({ start: index, end });
          index = quote.indexOf(term, end);
        }
      }

      if (!ranges.length) return escapeHtml(quote);

      ranges.sort((a, b) => a.start - b.start);
      let html = "";
      let cursor = 0;
      for (const range of ranges) {
        html += escapeHtml(quote.slice(cursor, range.start));
        html += `<mark class="time-word">${escapeHtml(quote.slice(range.start, range.end))}</mark>`;
        cursor = range.end;
      }
      html += escapeHtml(quote.slice(cursor));
      return html;
    }

    function renderHourRail(activeHour) {
      const fragment = document.createDocumentFragment();
      for (let hour = 0; hour < 24; hour += 1) {
        const button = document.createElement("button");
        button.type = "button";
        button.className = "hour-chip";
        button.dataset.hour = hour;
        button.setAttribute("aria-pressed", hour === activeHour ? "true" : "false");
        button.textContent = `${pad(hour)}시`;
        button.addEventListener("click", () => {
          state.live = false;
          state.gridHour = hour;
          state.selectedMinute = hour * 60;
          render();
        });
        fragment.appendChild(button);
      }
      els.hourRail.replaceChildren(fragment);
    }

    function renderGrid(activeMinuteIndex) {
      const active = timeFromIndex(activeMinuteIndex);
      const hour = state.live ? active.hour : state.gridHour;
      const fragment = document.createDocumentFragment();

      for (let minute = 0; minute < 60; minute += 1) {
        const index = hour * 60 + minute;
        const entry = entryForIndex(index);
        const time = timeFromIndex(index);
        const button = document.createElement("button");
        button.type = "button";
        button.className = "hour-button";
        button.title = `${time.label} · ${entry.work} · ${entry.author}`;
        button.dataset.minute = index;
        button.setAttribute("aria-pressed", index === activeMinuteIndex ? "true" : "false");
        button.innerHTML = `
          <span class="hour-top">
            <span class="hour-time">${time.label}</span>
          </span>
          <span class="hour-work">${entry.work}</span>
        `;
        button.addEventListener("click", () => {
          state.live = false;
          state.selectedMinute = index;
          state.gridHour = hour;
          render();
        });
        fragment.appendChild(button);
      }

      els.hourGrid.replaceChildren(fragment);
      els.countLabel.textContent = `${quoteMeta.total || quotes.length}분`;
      renderHourRail(hour);
    }

    function updateProgress(second) {
      els.minuteMeter.style.setProperty("--minute-progress", `${(second / 59) * 100}%`);
    }

    function render() {
      const now = new Date();
      if (state.live) {
        state.selectedMinute = currentMinuteIndex();
        state.gridHour = now.getHours();
      }

      const selected = timeFromIndex(state.selectedMinute);
      const second = state.live ? now.getSeconds() : 0;
      const entry = entryForIndex(state.selectedMinute);

      els.digitalTime.textContent = state.live
        ? `${selected.label}:${pad(second)}`
        : `${selected.label}:00`;
      els.dateLabel.textContent = formatDate(now);
      els.zoneLabel.textContent = Intl.DateTimeFormat().resolvedOptions().timeZone || "Local time";
      els.periodLabel.textContent = periodName(selected.hour);
      els.modeLabel.textContent = state.live ? "현재 분" : `${selected.label} 탐색`;

      els.quoteHour.textContent = selected.label;
      els.quoteText.innerHTML = highlightQuote(entry);
      els.quoteText.className = entry.quote.length > 300 ? "quote-very-long" : entry.quote.length > 180 ? "quote-long" : "";
      els.workTitle.textContent = entry.work;
      els.authorName.textContent = entry.author;
      els.sourceLink.href = entry.sourceUrl;
      els.sourceLink.textContent = "자료 보기";

      updateProgress(second);
      renderGrid(state.selectedMinute);
    }

    function shiftMinute(offset) {
      const base = state.live ? currentMinuteIndex() : state.selectedMinute;
      state.live = false;
      state.selectedMinute = (base + offset + 1440) % 1440;
      state.gridHour = timeFromIndex(state.selectedMinute).hour;
      render();
    }

    els.liveButton.addEventListener("click", () => {
      state.live = true;
      state.selectedMinute = currentMinuteIndex();
      state.gridHour = new Date().getHours();
      render();
    });

    els.prevButton.addEventListener("click", () => shiftMinute(-1));
    els.nextButton.addEventListener("click", () => shiftMinute(1));
    els.libraryToggle.addEventListener("click", () => {
      const expanded = els.libraryToggle.getAttribute("aria-expanded") === "true";
      els.libraryToggle.setAttribute("aria-expanded", String(!expanded));
      els.libraryPanel.hidden = expanded;
    });

    render();
    window.setInterval(render, 1000);
  </script>
</body>
</html>
